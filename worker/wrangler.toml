name             = "maresafe-worker"
main             = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev      = true
preview_urls     = false

[[d1_databases]]
binding       = "DB"
database_name = "maresafe-db"
database_id   = "2ec22b61-8912-4850-aed1-e89808ff839b"

[vars]
ALLOWED_ORIGIN = "https://maresafe.eu,https://www.maresafe.eu"
CARD_URL       = "https://maresafe.eu/"
ADMIN_EMAIL    = "stevenmater@gmail.com"

[observability.logs]
enabled = true
invocation_logs = true

# Secrets — set via `wrangler secret put`:
#   STRIPE_WEBHOOK_SECRET_LIVE   ← rename of existing STRIPE_WEBHOOK_SECRET
#   STRIPE_WEBHOOK_SECRET_TEST   ← test webhook signing secret (Stripe dashboard)
#   STRIPE_SECRET_KEY            ← already set — used as live key fallback for API calls
#   STRIPE_SECRET_KEY_TEST       ← optional: Stripe test secret key (sk_test_...) for test webhook quantity
#   BROWSERLESS_TOKEN
#   MASTER_CODE
#   RESEND_API_KEY
